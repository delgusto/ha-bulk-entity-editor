name: Feature request
description: Suggest a new bulk action or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's the problem you're trying to solve?
      description: The specific workflow that feels painful today.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      description: Rough sketch is fine. UI, behavior, edge cases you've thought about.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives or workarounds you've tried
      description: Optional, but helpful.
